server:
  port: 9999

spring:
  application:
    name: api-gateway
  # Importar la configuracion desde el Config Server
  config:
    import: optional:configserver:http://localhost:8888
  # Habilitar la creación automática de rutas para todos los servicios registrados en Consul
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true